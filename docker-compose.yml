services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tabletop
      POSTGRES_PASSWORD: tabletop
      POSTGRES_DB: tabletop_arena
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabletop -d tabletop_arena"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tabletop:tabletop@postgres:5432/tabletop_arena?schema=public
      SERVER_PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_SOCKET_PATH: /socket.io
    depends_on:
      - server
    expose:
      - "3000"

  proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - server

volumes:
  postgres-data:
